name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "vic-account-model"]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (pytest, in-memory SQLite)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        env:
          # CI 不依赖 MySQL；测试用 in-memory SQLite + StaticPool
          ENV: ci
          JWT_SECRET: ci-only-fixed-secret-not-for-production-use-32+chars
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          CORS_ORIGINS: http://localhost:5173
        run: pytest -q --tb=short

  web-user:
    name: web-user (vue-tsc + vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: web-user

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-user/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Build
        run: npm run build

  web-admin:
    name: web-admin (vue-tsc + vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: web-admin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-admin/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Build
        run: npm run build
