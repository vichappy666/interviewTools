<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>面试助手 · Web</title>
  <style>
    :root {
      --bg0: #0d0d18;
      --bg1: #151522;
      --bg2: rgba(0, 0, 0, 0.35);
      --panel: rgba(25, 25, 35, 0.94);
      --border: rgba(100, 140, 200, 0.22);
      --accent: #7eb8f0;
      --text: #e0e8f0;
      --text-dim: #99a8b8;
      --text-muted: #556677;
      --text-faint: #7a8899;
      --green: #4ade80;
      --amber: #fbbf24;
      --red: #f87171;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(ellipse at top, #1a1a2e 0%, var(--bg0) 70%);
      color: var(--text);
      font-family: -apple-system, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
      padding: 14px;
      gap: 10px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 6px;
    }
    header .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px currentColor;
    }
    header .dot.err { background: var(--red); }
    header .dot.think { background: var(--amber); }
    header .title {
      color: var(--accent);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 1px;
    }
    header .status {
      color: var(--text-dim);
      font-size: 12px;
    }
    header .spacer { flex: 1; }
    header .conn {
      font-size: 11px;
      color: var(--text-muted);
    }
    header .conn.ok { color: var(--green); }
    header .conn.bad { color: var(--red); }

    .top-row {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 10px;
      height: 38vh;
      min-height: 240px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .section-label {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    #transcript, #questions {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      color: var(--text);
      font-family: "SF Mono", Menlo, monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      user-select: text;
    }
    #questions { font-family: inherit; }

    #questions .q {
      padding: 2px 0;
      cursor: pointer;
      transition: color 0.15s;
    }
    #questions .q:hover { color: var(--accent); }
    #questions .q.asked { color: var(--text-faint); }
    #questions .q:not(:last-child) { border-bottom: 1px dashed rgba(255,255,255,0.04); }

    .answer-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .q-head {
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .q-head.empty { color: var(--text-muted); font-weight: 400; }

    .section {
      margin-bottom: 12px;
    }
    .section .head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .section .head .name {
      color: var(--accent);
      font-weight: 700;
    }
    .section .head .status {
      font-size: 11px;
    }
    .section .head .status.idle     { color: var(--text-muted); }
    .section .head .status.streaming{ color: var(--amber); }
    .section .head .status.done     { color: var(--green); }
    .section .head .copy-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.08);
      border: none; border-radius: 5px;
      color: var(--text-dim);
      padding: 3px 10px;
      font-size: 11px;
      cursor: pointer;
    }
    .section .head .copy-btn:hover { background: rgba(255,255,255,0.18); color: var(--text); }
    .section .body {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(100,140,200,0.18);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      line-height: 1.55;
      font-size: 13px;
      min-height: 36px;
      user-select: text;
    }
    .section .body ul { margin: 4px 0; padding-left: 20px; }
    .section .body li { margin: 2px 0; }
    .section .body b { color: #fff; }

    .ask-bar {
      display: flex;
      gap: 8px;
    }
    .ask-bar input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
    }
    .ask-bar input:focus { border-color: rgba(100,140,200,0.6); }
    .ask-bar button {
      background: linear-gradient(to right, rgba(70,120,200,0.9), rgba(100,150,230,0.9));
      border: none; border-radius: 8px;
      color: white;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .ask-bar button:hover { filter: brightness(1.12); }

    /* Floating selection popup */
    #popup {
      position: fixed;
      display: none;
      z-index: 1000;
      background: #1a1a2e;
      border: 1px solid rgba(126,184,240,0.4);
      border-radius: 8px;
      padding: 4px 6px;
      gap: 4px;
      display: none;
    }
    #popup.show { display: inline-flex; }
    #popup button {
      border: none; border-radius: 5px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      font-weight: 700;
    }
    #popup .ask {
      background: linear-gradient(to right, rgba(70,120,200,0.95), rgba(100,150,230,0.95));
      color: white;
    }
    #popup .close {
      background: rgba(255,255,255,0.15);
      color: var(--text-dim);
    }

    .non-q {
      color: var(--text-muted);
      font-style: italic;
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb {
      background: rgba(100,140,200,0.25);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100,140,200,0.45); }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <span class="dot" id="dot"></span>
      <span class="title">面试助手</span>
      <span class="status" id="status">--</span>
      <span class="spacer"></span>
      <span class="conn" id="conn">连接中...</span>
    </header>

    <div class="top-row">
      <div class="panel">
        <div class="section-label">实时转写</div>
        <div id="transcript"></div>
      </div>
      <div class="panel">
        <div class="section-label">识别的问题 (点击发问)</div>
        <div id="questions"></div>
      </div>
    </div>

    <div class="section-label" style="padding-left: 4px;">AI 回答</div>
    <div class="answer-scroll" id="answer">
      <div class="q-head empty" id="q-head">点击右侧问题或在转写区划选文字后发问...</div>
      <div id="sections" style="display:none">
        <div class="section" data-name="key_points">
          <div class="head">
            <span class="name">要点</span>
            <span class="status idle">· 等待中</span>
            <button class="copy-btn">📋 复制</button>
          </div>
          <div class="body"></div>
        </div>
        <div class="section" data-name="script">
          <div class="head">
            <span class="name">话术</span>
            <span class="status idle">· 等待中</span>
            <button class="copy-btn">📋 复制</button>
          </div>
          <div class="body"></div>
        </div>
        <div class="section" data-name="full">
          <div class="head">
            <span class="name">完整答案</span>
            <span class="status idle">· 等待中</span>
            <button class="copy-btn">📋 复制</button>
          </div>
          <div class="body"></div>
        </div>
      </div>
    </div>

    <form class="ask-bar" id="ask-form">
      <input id="ask-input" placeholder="手动输入问题，回车或点击发送..." autocomplete="off">
      <button type="submit">🤖 发送</button>
    </form>
  </div>

  <div id="popup">
    <button class="ask" id="popup-ask">🤖 问 AI</button>
    <button class="close" id="popup-close">×</button>
  </div>

  <script>
    (function () {
      const $ = (sel) => document.querySelector(sel);

      const el = {
        dot: $("#dot"),
        status: $("#status"),
        conn: $("#conn"),
        transcript: $("#transcript"),
        questions: $("#questions"),
        answer: $("#answer"),
        qHead: $("#q-head"),
        sections: $("#sections"),
        askForm: $("#ask-form"),
        askInput: $("#ask-input"),
        popup: $("#popup"),
        popupAsk: $("#popup-ask"),
        popupClose: $("#popup-close"),
      };

      const sectionEls = {
        key_points: el.sections.querySelector('[data-name="key_points"]'),
        script:     el.sections.querySelector('[data-name="script"]'),
        full:       el.sections.querySelector('[data-name="full"]'),
      };

      // 累积 section 原始 markdown（供增量渲染 / 复制）
      const sectionText = { key_points: "", script: "", full: "" };

      // ---------- 转写区稳定 DOM：finalsNode 只追加，partialNode 只改自己 ----------
      const finalsNode  = document.createTextNode("");
      const partialNode = document.createTextNode("");
      el.transcript.appendChild(finalsNode);
      el.transcript.appendChild(partialNode);

      // ---------- 渲染工具 ----------
      function escHtml(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
      function renderInline(s) {
        return escHtml(s).replace(/\*\*(.+?)\*\*/g, "<b>$1</b>");
      }
      function renderMarkdown(md) {
        const lines = md.split("\n");
        let out = "";
        let inUl = false;
        for (const raw of lines) {
          const line = raw.replace(/\s+$/, "");
          if (line.startsWith("- ")) {
            if (!inUl) { out += "<ul>"; inUl = true; }
            out += "<li>" + renderInline(line.slice(2)) + "</li>";
          } else {
            if (inUl) { out += "</ul>"; inUl = false; }
            if (line.trim()) out += "<div>" + renderInline(line) + "</div>";
            else out += "<div>&nbsp;</div>";
          }
        }
        if (inUl) out += "</ul>";
        return out;
      }

      // ---------- 转写 ----------
      // finals 用 appendData（偏移量只扩展不重排，选区安全）
      // partial 只改 partialNode.data，不影响 finalsNode 里的选区
      function appendFinal(text) {
        finalsNode.appendData(text + "\n");
        partialNode.data = "";
        autoScroll(el.transcript);
      }
      function setPartial(text) {
        // 只在真正变化时改，避免破坏跨到 partial 区的罕见选区
        if (partialNode.data !== text) partialNode.data = text;
        autoScroll(el.transcript);
      }
      function resetTranscript(finals, partial) {
        // 仅 snapshot 初次加载用（此时用户不可能有选区）
        finalsNode.data = (finals || []).join("\n");
        if (finalsNode.data) finalsNode.appendData("\n");
        partialNode.data = partial || "";
        autoScroll(el.transcript);
      }

      // ---------- 问题列表（增量 DOM） ----------
      const questions = []; // {text, state, node}
      function appendQuestion(q) {
        const d = document.createElement("div");
        d.className = "q" + (q.state === "asked" ? " asked" : "");
        d.textContent = q.text;
        d.dataset.index = String(questions.length);
        el.questions.appendChild(d);
        q.node = d;
        questions.push(q);
        autoScroll(el.questions);
      }
      function markQuestionAsked(i) {
        const q = questions[i];
        if (!q) return;
        q.state = "asked";
        if (q.node) q.node.classList.add("asked");
      }
      function resetQuestions(list) {
        el.questions.innerHTML = "";
        questions.length = 0;
        (list || []).forEach((q) => appendQuestion({ text: q.text, state: q.state }));
      }

      el.questions.addEventListener("click", (e) => {
        // 有选区走 popup 路线
        const sel = window.getSelection();
        if (sel && sel.toString().trim().length >= 2) return;
        const target = e.target.closest(".q");
        if (!target) return;
        const idx = parseInt(target.dataset.index, 10);
        if (isNaN(idx)) return;
        const q = questions[idx];
        if (!q) return;
        send({ type: "ask", text: q.text });
        // 乐观标记（服务端随后也会回 question_asked）
        markQuestionAsked(idx);
      });

      // ---------- 回答区 ----------
      function resetSections() {
        for (const name of ["key_points", "script", "full"]) {
          sectionText[name] = "";
          const s = sectionEls[name];
          s.querySelector(".body").innerHTML = "";
          const st = s.querySelector(".status");
          st.textContent = "· 等待中";
          st.className = "status idle";
          s.querySelector(".copy-btn").textContent = "📋 复制";
        }
      }
      function beginAnswer(q) {
        el.qHead.classList.remove("empty", "non-q");
        el.qHead.textContent = "Q：" + (q.length > 80 ? q.slice(0, 80) + "…" : q);
        el.sections.style.display = "";
        resetSections();
      }
      function setSectionStatus(name, st, label) {
        const s = sectionEls[name];
        if (!s) return;
        const stEl = s.querySelector(".status");
        stEl.className = "status " + st;
        stEl.textContent = label;
      }
      function appendSection(name, text) {
        if (!sectionEls[name]) return;
        sectionText[name] += text;
        sectionEls[name].querySelector(".body").innerHTML = renderMarkdown(sectionText[name]);
      }
      function onNonQuestion() {
        el.qHead.className = "q-head non-q";
        el.qHead.textContent = "[非问题 · 跳过]";
        el.sections.style.display = "none";
      }

      // 复制按钮
      for (const [name, s] of Object.entries(sectionEls)) {
        s.querySelector(".copy-btn").addEventListener("click", () => {
          const txt = sectionText[name].replace(/\*\*/g, "").trim();
          navigator.clipboard.writeText(txt).then(() => {
            const btn = s.querySelector(".copy-btn");
            btn.textContent = "已复制 ✓";
            setTimeout(() => { btn.textContent = "📋 复制"; }, 2000);
          });
        });
      }

      // ---------- 划选气泡 ----------
      let currentSelection = "";
      function maybeShowPopup() {
        const sel = window.getSelection();
        const text = sel ? sel.toString().trim() : "";
        // 限制：只在转写 / 问题列表 / 回答区内生效
        if (text.length < 2 || !sel.rangeCount) { hidePopup(); return; }
        const node = sel.anchorNode;
        const inScope =
          (node && (
            el.transcript.contains(node) ||
            el.questions.contains(node) ||
            el.answer.contains(node)
          ));
        if (!inScope) { hidePopup(); return; }
        const rect = sel.getRangeAt(0).getBoundingClientRect();
        currentSelection = text;
        el.popup.classList.add("show");
        const px = Math.min(window.innerWidth - 140, rect.right + 6);
        const py = Math.max(4, rect.top - 36);
        el.popup.style.left = px + "px";
        el.popup.style.top = py + "px";
      }
      function hidePopup() {
        el.popup.classList.remove("show");
        currentSelection = "";
      }
      document.addEventListener("mouseup", () => setTimeout(maybeShowPopup, 0));
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") hidePopup(); });
      el.popupAsk.addEventListener("click", () => {
        const t = currentSelection;
        hidePopup();
        if (t) send({ type: "ask", text: t });
      });
      el.popupClose.addEventListener("click", hidePopup);

      // ---------- 手动输入 ----------
      el.askForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const t = el.askInput.value.trim();
        if (!t) return;
        send({ type: "ask", text: t });
        el.askInput.value = "";
      });

      // ---------- 状态灯 ----------
      function setStatus(text) {
        el.status.textContent = text;
        el.dot.className = "dot";
        if (text.includes("错误")) el.dot.classList.add("err");
        else if (text.includes("思考")) el.dot.classList.add("think");
      }

      // ---------- WebSocket ----------
      let ws = null;
      let reconnectTimer = null;

      function connect() {
        const url = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws";
        ws = new WebSocket(url);
        el.conn.textContent = "连接中...";
        el.conn.className = "conn";

        ws.onopen = () => {
          el.conn.textContent = "● 已连接";
          el.conn.className = "conn ok";
        };
        ws.onmessage = (ev) => handleServer(JSON.parse(ev.data));
        ws.onclose = () => {
          el.conn.textContent = "● 断开，5s 后重连";
          el.conn.className = "conn bad";
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connect, 5000);
        };
        ws.onerror = () => { try { ws.close(); } catch (e) {} };
      }
      function send(obj) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(obj));
        }
      }

      function handleServer(m) {
        switch (m.type) {
          case "snapshot":
            applySnapshot(m.state);
            break;
          case "status":
            setStatus(m.text);
            break;
          case "partial":
            setPartial(m.text);
            break;
          case "final":
            appendFinal(m.text);
            break;
          case "question_added":
            appendQuestion({ text: m.text, state: "pending" });
            break;
          case "question_asked":
            markQuestionAsked(m.index);
            break;
          case "answer_started":
            beginAnswer(m.question);
            break;
          case "section_start":
            setSectionStatus(m.name, "streaming", "⏳ 生成中");
            break;
          case "section_chunk":
            appendSection(m.name, m.text);
            break;
          case "section_end":
            setSectionStatus(m.name, "done", "✓ 已完成");
            break;
          case "answer_non_question":
            onNonQuestion();
            break;
          case "error":
            setStatus("错误: " + m.text);
            break;
        }
      }

      function applySnapshot(s) {
        setStatus(s.status || "--");
        resetTranscript(s.transcript_finals, s.transcript_partial);
        resetQuestions(s.questions);

        const ca = s.current_answer;
        if (!ca) {
          el.qHead.className = "q-head empty";
          el.qHead.textContent = "点击右侧问题或在转写区划选文字后发问...";
          el.sections.style.display = "none";
        } else if (ca.non_question) {
          onNonQuestion();
        } else {
          beginAnswer(ca.question);
          for (const name of ["key_points", "script", "full"]) {
            const sec = ca.sections[name];
            if (!sec) continue;
            if (sec.text) appendSection(name, sec.text);
            if (sec.state === "streaming") setSectionStatus(name, "streaming", "⏳ 生成中");
            else if (sec.state === "done") setSectionStatus(name, "done", "✓ 已完成");
          }
        }
      }

      function autoScroll(node) {
        // 仅当用户贴底时自动滚
        if (node.scrollHeight - node.clientHeight - node.scrollTop < 60) {
          node.scrollTop = node.scrollHeight;
        }
      }

      connect();
    })();
  </script>
</body>
</html>
